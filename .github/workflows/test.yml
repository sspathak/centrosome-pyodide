name: nucleus

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]

jobs:
  wasm-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: latest
        cache: true

    - name: Build and Test WebAssembly
      # Runs the Docker-based build and Node.js test suite defined in pixi.toml
      run: |
        pixi run build-wasm
        pixi run test-wasm