name: nucleus

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, review_requested]

jobs:
  # Job 1: Standard native matrix testing
  native-tests:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        # Expanded to cover all target release versions
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Installation
      run: |
        python -m pip install --upgrade pip
        # Updated to modern constraints
        pip install "cython>=3.0.0"
        pip install "numpy>=2.0.0"
        pip install -e .[dev,test]
    - name: Test
      run: pytest

  # Job 2: WebAssembly headless testing via Pixi and Node.js
  wasm-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: latest
        cache: true
    - name: Build and Test WebAssembly
      # Triggers the Docker build and Node.js test environments
      run: |
        pixi run build-wasm
        pixi run test-wasm