name: meiosis

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-wasm-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
          
      - name: Build WebAssembly Wheel
        run: pixi run build-wasm

      - name: Generate Forced 4_0_9 Tag
        run: |
          cd dist
          WHEEL=$(ls *.whl | grep "pyemscripten" | head -n 1)
          if [ -n "$WHEEL" ]; then
            # Replaces modern pyemscripten tag with legacy emscripten_4_0_9
            FORCED_WHEEL=$(echo $WHEEL | sed 's/pyemscripten_[0-9]\{4\}_[0-9]/emscripten_4_0_9/')
            cp "$WHEEL" "$FORCED_WHEEL"
            echo "Created legacy wheel: $FORCED_WHEEL"
          fi

      - name: Store Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-wasm32-all-tags
          path: ./dist/*.whl