[workspace]
authors = ["Nodar Gogoberidze <gnodar01@gmail.com>"]
channels = ["conda-forge"]
description = "Dev environment for centrosome"
name = "centrosome"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
build = "python -m build"
tag = "$PIXI_PROJECT_ROOT/scripts/tag.sh"
retrieve = "$PIXI_PROJECT_ROOT/scripts/download_artifacts.sh"
publish = "twine upload dist/*"

build-wasm = """
docker run --rm -v $PIXI_PROJECT_ROOT:/src -w /src \
ghcr.io/pyodide/pyodide-env:20260120-chrome145-firefox146-py313 \
bash -c "pip install pyodide-build build 'cython>=3.0.0' 'numpy>=2.0.0' && \
         export SETUPTOOLS_SCM_PRETEND_VERSION=1.3.3 && \
         export PYODIDE_PLATFORM_TAG=emscripten_4_0_9_wasm32 && \
         pyodide build"
"""

test-wasm = """
docker run --rm -v $PIXI_PROJECT_ROOT:/src -w /tmp \
ghcr.io/pyodide/pyodide-env:20260120-chrome145-firefox146-py313 \
bash -c "pip install pyodide-build pytest && \
         pyodide venv .venv-wasm && \
         .venv-wasm/bin/pip install /src/dist/centrosome-*.whl && \
         .venv-wasm/bin/python -c 'import centrosome; print(centrosome.__version__)'"
"""

[pypi-dependencies]
centrosome = { path = ".", extras = ["dev", "test"]}
setuptools = ">=75.6.0, <76"
build = ">=1.2.2.post1, <2"
twine = ">=6.0.1, <7"
pyodide-build = "*"

[dependencies]
python = "3.13.*"
cython = ">=3.0.0"
numpy = ">=2.4.3,<3"
pytest = ">=9.0.2,<10"
c-compiler = ">=1.11.0,<2"
cxx-compiler = ">=1.11.0,<2"
scikit-image = ">=0.26.0,<0.27"
scipy = ">=1.17.1,<2"
pillow = ">=12.2.0,<13"
deprecation = ">=2.1.0,<3"
nodejs = ">=25.8.2,<25.9"
six = "*"
